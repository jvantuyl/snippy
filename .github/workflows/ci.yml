name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test & Coverage
    runs-on: [self-hosted, linux, snippy]
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v5

      - name: Detect ImageOS (self-hosted runner)
        run: |
          . /etc/os-release
          case "${ID}-${VERSION_ID}" in
            ubuntu-22.04) IMAGE_OS=ubuntu22 ;;
            ubuntu-24.04) IMAGE_OS=ubuntu24 ;;
            *)            IMAGE_OS=ubuntu24 ;;
          esac
          echo "ImageOS=${IMAGE_OS}" >> "${GITHUB_ENV}"

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Cache build & deps
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('.tool-versions') }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ hashFiles('.tool-versions') }}-

      - name: Install hex & rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Lint (credo --strict)
        run: mix credo --strict

      - name: Run tests with coverage
        run: mix coveralls.html

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: cover/
          retention-days: 14

  pages:
    name: Build & Deploy GitHub Pages
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, snippy]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Detect ImageOS (self-hosted runner)
        run: |
          . /etc/os-release
          case "${ID}-${VERSION_ID}" in
            ubuntu-22.04) IMAGE_OS=ubuntu22 ;;
            ubuntu-24.04) IMAGE_OS=ubuntu24 ;;
            *)            IMAGE_OS=ubuntu24 ;;
          esac
          echo "ImageOS=${IMAGE_OS}" >> "${GITHUB_ENV}"

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Cache build & deps
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-pages-${{ hashFiles('.tool-versions') }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-pages-${{ hashFiles('.tool-versions') }}-

      - name: Install hex & rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get

      - name: Generate documentation
        env:
          MIX_ENV: dev
        run: mix docs

      - name: Generate coverage report
        env:
          MIX_ENV: test
        run: mix coveralls.html

      - name: Assemble Pages site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/coverage
          cp -R doc/. _site/
          cp -R cover/. _site/coverage/
          # Friendly redirect so /coverage/ resolves to the excoveralls report.
          cat > _site/coverage/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>Snippy Coverage</title>
          <meta http-equiv="refresh" content="0; url=excoveralls.html">
          <link rel="canonical" href="excoveralls.html">
          <p>Redirecting to <a href="excoveralls.html">coverage report</a>.</p>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
